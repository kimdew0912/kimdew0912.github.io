<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Speech API Check</title>
<style>
body { font-family: sans-serif; padding: 24px; font-size: 22px; }
.row { margin: 12px 0; padding: 14px; border-radius: 6px; }
.yes { background: #ffdddd; color: #900; border: 2px solid #900; }
.no { background: #ddffdd; color: #060; border: 2px solid #060; }
.info { background: #eef; color: #224; border: 2px solid #446; white-space: pre; font-family: monospace; font-size: 16px; }
h1 { font-size: 26px; }
</style>
</head>
<body>
<h1>Speech API Check</h1>
<div id="wsr" class="row"></div>
<div id="sr" class="row"></div>
<div id="ss" class="row"></div>
<div id="gum" class="row"></div>
<div id="aidevs" class="row"></div>
<div id="devlist" class="row info">loading devices…</div>
<script>
function show(id, label, val) {
  const el = document.getElementById(id);
  el.textContent = label + ' : ' + val;
  el.className = 'row ' + (val ? 'yes' : 'no');
}
show('wsr', 'webkitSpeechRecognition in window', 'webkitSpeechRecognition' in window);
show('sr', 'SpeechRecognition in window', 'SpeechRecognition' in window);
show('ss', 'speechSynthesis in window', 'speechSynthesis' in window);
show('gum', 'getUserMedia exists', !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

(async () => {
  try {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const audio = devs.filter(d => d.kind === 'audioinput');
    show('aidevs', 'audioinput count', audio.length);
    const lines = ['All devices:'];
    devs.forEach((d, i) => lines.push(`  [${i}] kind=${d.kind} id=${d.deviceId.slice(0, 12)}… label="${d.label}"`));
    document.getElementById('devlist').textContent = lines.join('\n');
  } catch (e) {
    document.getElementById('devlist').textContent = 'enumerateDevices error: ' + e;
  }
})();
</script>
</body>
</html>
